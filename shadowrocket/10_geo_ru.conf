#!name=10_geo_ru
#!desc=Russian geo routing layer

[Rule]

# =========================
# 🇷🇺 RUSSIAN GEOIP
# =========================

# Основной маршрут для российских IP
GEOIP,RU,DIRECT


# =========================
# 🇷🇺 РУССКИЕ IDN / .РФ
# =========================

# punycode для .рф
DOMAIN-SUFFIX,xn--p1ai,DIRECT


# =========================
# 🇷🇺 ЛОКАЛЬНЫЕ RU DNS / INFRA
# =========================

DOMAIN-SUFFIX,ru,DIRECT
DOMAIN-SUFFIX,su,DIRECT


# =========================
# ⚠️ ИСКЛЮЧЕНИЯ (важно)
# =========================

# некоторые глобальные сервисы используют .ru зеркала
# их лучше потом переопределять в proxy-модулях
