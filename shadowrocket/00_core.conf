#!name=00_core
#!desc=Core routing safety layer (LAN + leak protection + base behavior)

[Rule]

# =========================
# LOCAL NETWORK
# =========================
IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
IP-CIDR,169.254.0.0/16,DIRECT,no-resolve

# IPv6 local & link-local
IP-CIDR6,::1/128,DIRECT,no-resolve
IP-CIDR6,fe80::/10,DIRECT,no-resolve
IP-CIDR6,fc00::/7,DIRECT,no-resolve


# =========================
# SYSTEM / APPLE INFRA (локальные функции устройства)
# =========================
DOMAIN-SUFFIX,local,DIRECT
DOMAIN-SUFFIX,home.arpa,DIRECT
DOMAIN,captive.apple.com,DIRECT


# =========================
# QUIC / UDP 443 (снижает обход маршрутизации через HTTP3)
# =========================
AND,((PROTOCOL,UDP),(DEST-PORT,443)),REJECT


# =========================
# DNS LEAK CONTROL
# =========================
dns-server = system
fallback-dns-server = system

dns-direct-system = false
dns-direct-fallback-proxy = true
private-ip-answer = true

ipv6 = true
prefer-ipv6 = false

# =========================
# SAFETY BEHAVIOR DEFAULTS
# =========================

# fallback логика (будет переопределена FINAL'ом)
FINAL,PROXY

[Host]
localhost = 127.0.0.1
